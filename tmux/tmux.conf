# ─── Prefix ────────────────────────────────────────────────────────────────
# Two prefixes: C-a is the primary; C-p mirrors zellij's `Ctrl-p` entry to
# pane-mode (any pane-mode binding below works under either prefix).
unbind C-b
set -g prefix C-a
set -g prefix2 C-p
bind C-a send-prefix
bind C-p send-prefix -2

# ─── General ───────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"

# Terminal features for the host (Ghostty). Without these, tmux strips
# escape sequences before they reach the terminal:
#   RGB        — 24-bit truecolor (replaces older ",*256col*:Tc" override)
#   cstyle     — DECSCUSR (cursor shape: block/beam/underscore) — required
#                for zsh-helix-mode's per-mode cursor swap to be visible
#   ccolour    — OSC 12 (cursor color) — also used by zsh-helix-mode
#   hyperlinks — OSC 8 (clickable URLs) for tools like eza --hyperlink
#   extkeys    — extended/CSI-u key encoding so Shift+Enter, Ctrl+Enter,
#                etc. reach apps inside tmux distinctly. Required for
#                Claude Code (and any TUI that wants modal Enter input).
set -as terminal-features ",xterm-ghostty:RGB:cstyle:ccolour:hyperlinks:extkeys"
set -as terminal-features ",xterm-256color:RGB:cstyle:ccolour:hyperlinks:extkeys"

# `always` (rather than the default `on`) forwards extended-key sequences
# unconditionally, even to apps that don't request them via the kitty
# keyboard protocol activation sequence. Claude Code currently doesn't
# request, so without this Shift+Enter is indistinguishable from Enter.
set -s extended-keys always

# Allow apps inside tmux to talk to the host terminal — required for yazi's
# DA1/DSR startup queries to receive responses (otherwise yazi shows a
# "Terminal response timeout" error in popups). Also enables sixel images,
# OSC 52 clipboard, etc.
set -g allow-passthrough on

# Image preview support for yazi — per yazi's official image-preview docs,
# tmux needs to forward TERM and TERM_PROGRAM into the pane environment so
# yazi can detect the host terminal protocol (Ghostty advertises kitty
# unicode placeholders for inline image rendering).
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -g history-limit 50000
set -g mouse on
set -g escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g display-time 2000
set -g status-interval 5

# ─── Direct Alt / Ctrl bindings (parity with zellij normal mode) ───────────
# Pane focus (zellij: Alt h/j/k/l → MoveFocus). Alt-x intentionally NOT
# bound here — Helix uses it for shrink_to_line_bounds. Close panes via
# `prefix x`.
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Pane zoom (zellij: Alt f → ToggleFocusFullscreen)
bind -n M-f resize-pane -Z

# Window / tab management (zellij: Alt t / Alt w / Alt 1-5 / Alt [ / Alt ])
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-w confirm-before -p "kill window #W? (y/n)" "kill-window"
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5
bind -n M-6 select-window -t :=6
bind -n M-7 select-window -t :=7
bind -n M-8 select-window -t :=8
bind -n M-9 select-window -t :=9
# M-, and M-. for prev/next window. (M-[ / M-] would also work as Alt-keys
# but they collide with the CSI prefix `\e[` that terminal-response queries
# use — yazi specifically warns against binding M-[ for that reason.)
# Unbind the old M-[/M-] in case they linger from a previous tmux config:
unbind -n "M-["
unbind -n "M-]"
bind -n "M-," previous-window
bind -n "M-." next-window

# Session control (zellij: Ctrl q → Detach, Alt q → Quit)
bind -n C-q detach-client
bind -n M-q confirm-before -p "kill session #S? (y/n)" "kill-session"

# Scroll / copy mode entry (zellij: Ctrl s → Scroll mode)
bind -n C-s copy-mode

# ─── Reload config (prefix R) ──────────────────────────────────────────────
# Lowercase `r` is taken below for split-right (zellij pane-mode `r`).
bind R source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# ─── Splits ────────────────────────────────────────────────────────────────
# tmux idioms (`|` `-`) plus zellij pane-mode parity (`n` new, `d` down, `r` right).
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind n split-window -h -c "#{pane_current_path}"
bind d split-window -v -c "#{pane_current_path}"
bind r split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# ─── Pane mode (after prefix C-a or prefix2 C-p) ───────────────────────────
# zellij pane-mode parity. Focus
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize (-r = repeatable without re-pressing prefix)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Resize mode (zellij-style modal pane sizing) ─────────────────────────
# C-n at the shell (or any non-helix pane) enters resize mode. Helix uses
# C-n itself (move_line_down), so when the focused pane's foreground is
# `hx` we forward C-n through unchanged instead of intercepting.
#
# Inside resize mode: h/j/k/l resize the active pane by 5 cells and stay
# in the mode for repeated resizes. Esc / q / C-n exit. Any other key
# also exits (because `switch-client -T` is one-shot — bindings that don't
# explicitly re-enter the table fall back to root).
bind -n C-n if-shell -F '#{m:*hx*,#{pane_current_command}}' \
	'send-keys C-n' \
	'switch-client -T resize_mode'

bind -T resize_mode h { resize-pane -L 5 ; switch-client -T resize_mode }
bind -T resize_mode j { resize-pane -D 5 ; switch-client -T resize_mode }
bind -T resize_mode k { resize-pane -U 5 ; switch-client -T resize_mode }
bind -T resize_mode l { resize-pane -R 5 ; switch-client -T resize_mode }
bind -T resize_mode Escape switch-client -T root
bind -T resize_mode q      switch-client -T root
bind -T resize_mode C-n    switch-client -T root

# Pane ops (zellij: x close, f fullscreen, c rename-window)
bind x kill-pane
bind f resize-pane -Z
bind c command-prompt -p "rename window:" "rename-window '%%'"

# ─── Copy mode (vi) ────────────────────────────────────────────────────────
# `set -g mouse on` (above) already routes wheel scrolling to copy-mode
# automatically. Defaults that already match zellij's Scroll mode:
#   j/k        line down/up
#   Ctrl-f/Ctrl-b page down/up
#   g/G        top / bottom of history
#   /  ?       search forward / back
#   n/N        next / previous match
#   Esc / q    exit copy mode
# Additions below close the remaining zellij parity gaps.
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel

# zellij scroll-mode parity: bare d / u for half-page (tmux's default needs
# Ctrl-d / Ctrl-u); Ctrl-c jumps to bottom and exits, matching zellij.
bind -T copy-mode-vi d send-keys -X halfpage-down
bind -T copy-mode-vi u send-keys -X halfpage-up
bind -T copy-mode-vi C-c send-keys -X history-bottom \; send-keys -X cancel

# ─── Deep Nord Aurora theme ────────────────────────────────────────────────
# Polar Night surfaces (deep ink), Frost for primary UI, Aurora for accents.
# The bar uses an explicit darker shade (one notch below polar0) so it reads
# as a recessed strip; segments use `bg=default` so the whole bar appears
# as one continuous block. Powerline glyphs require a Nerd Font.
# polar0=#1A1F28  polar1=#232934  polar3=#4F5870  snow0=#D8DEE9
# frost1=#74BCD9  red=#D04E5C  orange=#D97757  yellow=#DDB867  green=#8DBC6E

set -g status-position bottom
set -g status-justify left
# Status bar bg is #13171F — one notch DARKER than polar0 (#1A1F28) — so
# the bar reads as a recessed strip rather than a raised one. Same shade
# is used for Helix's statusline so the two stacked bars at the bottom
# of the terminal share the exact same recessed shade.
set -g status-style "bg=#13171F fg=#D8DEE9"
set -g status-left-length 60
set -g status-right-length 100

# Status segments are flat — colored text only, no filled badges. Each
# `bg=default` lets the bar's #13171F background show through so the
# whole bar reads as one continuous strip.
set -g status-left "#[fg=#D97757,bold] #S  "

# Right side — prefix and resize indicators (only visible when active),
# then date / time / host. All as bold colored text on the bar bg.
set -g status-right "#{?#{==:#{client_key_table},resize_mode},#[fg=#D97757#,bold]RESIZE  ,}#{?client_prefix,#[fg=#DDB867#,bold]PREFIX  ,}#[fg=#D8DEE9]%Y-%m-%d #[fg=#DDB867]%H:%M #[fg=#74BCD9,bold] #h "

# Window list — active window is bold cyan text, inactive is muted grey.
# No triangle caps, no filled badges — visual distinction comes from
# colour + bold weight only.
setw -g window-status-separator "  "
setw -g window-status-current-style "fg=#74BCD9 bg=default bold"
setw -g window-status-current-format "#I:#W#{?window_zoomed_flag, ,}"
setw -g window-status-style "fg=#6B7488 bg=default"
setw -g window-status-format "#I:#W"
setw -g window-status-activity-style "fg=#DDB867 bg=default"
setw -g window-status-bell-style "fg=#D04E5C bg=default bold"

# Mode / message overlays stay opaque so transient state is readable
set -g mode-style "fg=#1A1F28 bg=#DDB867 bold"
set -g message-style "fg=#1A1F28 bg=#74BCD9 bold"
set -g message-command-style "fg=#1A1F28 bg=#8DBC6E bold"

# ─── Pane borders ──────────────────────────────────────────────────────────
# Heavy box-drawing chars give the active pane a clear, weighty accent
# against the deep ink background. Active border is frost1 bold; inactive
# is dim polar3. tmux's shared-border architecture means the corner glyph
# at the active pane's junctions gets drawn in the active style — that's
# a single-cell visual stub by design (tmux issues #2540 / #1786) and
# can't be configured away.
set -g pane-border-lines heavy
set -g pane-border-indicators off
set -g pane-border-style "fg=#4F5870"             # polar3 — visible against deep bg
set -g pane-active-border-style "fg=#74BCD9,bold" # frost1 bold — clear active accent

# Subtle active/inactive pane dimming via window-style. Inactive panes get
# a faded fg; active pane gets full snow0. Doesn't touch syntax colors —
# only the default foreground for unstyled text.
set -g window-style "fg=#6B7488,bg=default"
set -g window-active-style "fg=#D8DEE9,bg=default"

# One-row title strip on every pane: index • command • cwd. Active pane
# gets the Aurora-orange index; others fade to polar3.
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#D97757#,bold],#[fg=#4F5870]} #P #[fg=#4F5870]│ #[fg=#74BCD9]#{pane_current_command} #[fg=#4F5870]│ #[fg=#D8DEE9]#{b:pane_current_path}#[default]"

# `prefix q` big-numbers overlay — Deep Nord Aurora colors, longer display.
set -g display-panes-colour "#4F5870"            # polar3 — inactive
set -g display-panes-active-colour "#D97757"     # orange — active
set -g display-panes-time 2000                   # 2s before dismissing

# Activity / bell signals on inactive windows
set -g monitor-activity on
set -g visual-activity off
set -g bell-action other
