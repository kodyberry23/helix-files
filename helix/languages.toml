# Per-language config. Helix has default language-server entries for
# rust-analyzer, typescript-language-server, jdtls, elixir-ls, and erlang_ls;
# we only override here when we want extra behavior (formatters, args, etc).
# See: https://docs.helix-editor.com/languages.html
#
# Buffer auto-reload on disk changes is handled in-editor by the
# [editor.auto-reload] block in config.toml (helix-editor/helix PR #13963
# cherry-picked into local-patches), so no per-language fs_watcher_lsp
# entries are needed.

# ─── marksman ─────────────────────────────────────────────────────────────
# Markdown LSP (xrefs, headings nav, completions). Installed via Homebrew
# in setup.sh (BREW_FORMULAS in scripts/lib/common.sh).
[language-server.marksman]
command = "marksman"
args = ["server"]

# ─── Rust ──────────────────────────────────────────────────────────────────
[[language]]
name = "rust"
auto-format = false

[language-server.rust-analyzer.config.check]
command = "clippy"

# ─── TypeScript / JavaScript ──────────────────────────────────────────────
# Inferred-type inlay hints (the `: SomeType` annotations the LSP injects
# next to `const x = ...`, return values, class fields, and parameters) are
# disabled here. Parameter NAMES and enum member values stay on - those
# aren't inferred types and are usually still useful. Re-enable any of
# these by flipping the flag if you want a specific hint back.
[language-server.typescript-language-server.config.typescript.inlayHints]
parameterTypes = { enabled = false }
variableTypes = { enabled = false }
propertyDeclarationTypes = { enabled = false }
functionLikeReturnTypes = { enabled = false }

[language-server.typescript-language-server.config.javascript.inlayHints]
parameterTypes = { enabled = false }
variableTypes = { enabled = false }
propertyDeclarationTypes = { enabled = false }
functionLikeReturnTypes = { enabled = false }

[[language]]
name = "typescript"
auto-format = false
formatter = { command = "prettier", args = ["--parser", "typescript"] }

[[language]]
name = "tsx"
auto-format = false
formatter = { command = "prettier", args = ["--parser", "typescript"] }

[[language]]
name = "javascript"
auto-format = false
formatter = { command = "prettier", args = ["--parser", "babel"] }

[[language]]
name = "jsx"
auto-format = false
formatter = { command = "prettier", args = ["--parser", "babel"] }

# ─── Java ─────────────────────────────────────────────────────────────────
[[language]]
name = "java"
auto-format = false

# ─── Elixir ───────────────────────────────────────────────────────────────
[[language]]
name = "elixir"
auto-format = false

# ─── Misc formatters ──────────────────────────────────────────────────────
[[language]]
name = "json"
formatter = { command = "prettier", args = ["--parser", "json"] }

[[language]]
name = "markdown"
language-servers = ["marksman"]
soft-wrap.enable = true
formatter = { command = "prettier", args = ["--parser", "markdown"] }

[[language]]
name = "toml"
formatter = { command = "taplo", args = ["fmt", "-"] }

# Helix has no built-in "text" language, so define one for plain .txt / .log.
# No LSP attached - disk-change reloads come from [editor.auto-reload] in
# config.toml.
[[language]]
name = "text"
scope = "text.plain"
file-types = ["txt", "log"]
roots = []
soft-wrap.enable = true
