theme = "nord-aurora"

[editor]
line-number = "relative"
mouse = true
bufferline = "always"
color-modes = true
cursorline = true
auto-format = false
# `focus-lost` alone (the legacy `auto-save = true` form) only saves when
# Helix loses focus — useless while you're actively editing. `after-delay`
# is what clears the `[+]` dirty flag that fs_watcher_lsp leaves on the
# buffer after an external write (e.g., a formatter ran outside Helix):
# the LSP applies an edit to match disk, the buffer matches disk in
# content but is marked dirty, and 1s of idle later auto-save writes it
# back and clears the flag without needing `:reload`.
auto-save = { focus-lost = true, after-delay = { enable = true, timeout = 1000 } }
completion-trigger-len = 1
true-color = true
# Pin to pbcopy/pbpaste. Auto-detect would route through `tmux save-buffer`
# when TMUX is set + tmux is on PATH, and we deliberately set TMUX=zellij
# inside zellij sessions (see scripts/setup.sh hx()) for the OSC 11 bg
# workaround — pinning prevents that from stealing the clipboard.
clipboard-provider = "pasteboard"
# Implicitly trust every workspace — skips the "trust this project?" prompt
# on first open. The flag is named `insecure` because it disables the guard
# against malicious local-config / language-server payloads in untrusted
# repos. Safe enough when you only open projects you authored.
insecure = true

[editor.gutters]
# Default layout omits a trailing spacer, so the diff stripe sits flush
# against the buffer content. Add one to give it breathing room.
layout = ["diagnostics", "spacer", "line-numbers", "spacer", "diff", "spacer"]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = ["mode", "spinner", "version-control", "file-name", "file-modification-indicator"]
center = []
right = ["diagnostics", "selections", "register", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.file-picker]
hidden = false

[editor.indent-guides]
render = false

[editor.soft-wrap]
enable = false

[editor.whitespace.render]
space = "none"
tab = "all"
nbsp = "all"
newline = "none"

[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
tab = "→"
newline = "⏎"

[keys.normal]
# Quick save/quit
"space"."w" = ":w"
"space"."q" = ":q"
"space"."x" = ":x"
# Center cursor on screen movements
"C-d" = ["half_page_down", "align_view_center"]
"C-u" = ["half_page_up", "align_view_center"]
# Easier line navigation
"H" = "goto_line_start"
"L" = "goto_line_end"

# Yazi as file picker. `space e` opens yazi; the action (open vs. vsplit)
# is decided FROM WITHIN yazi:
#   Enter → :open <picked>
#   C-v   → :vsplit <picked>  (yazi-side keybind in yazi/keymap.toml)
#
# Helix can't pick between :open and :vsplit from one substitution, so the
# chain runs both. The wrapper emits a real path only for its corresponding
# mode and an inert sentinel for the other (current buffer for :open,
# `/dev/null` for :vsplit). The trailing `:echo ""` clears the status-bar
# error :vsplit raises against /dev/null (character device → IrregularFile).
#
# The :redraw repaints helix after yazi exits. The which-key popup-flash
# is suppressed in yazi-pick.sh itself (it clears the main screen before
# yazi enters alt-screen, so the restored pixels are blank).
"space"."e" = [
    ":insert-output $HOME/projects/helix-files/scripts/yazi-pick.sh run '%{file_path_absolute}'",
    ":redraw",
    ":open \"%sh{$HOME/projects/helix-files/scripts/yazi-pick.sh open '%{file_path_absolute}'}\"",
    ":vsplit \"%sh{$HOME/projects/helix-files/scripts/yazi-pick.sh vsplit '%{file_path_absolute}'}\"",
    ':echo ""',
]

[keys.insert]
"j"."k" = "normal_mode"
