theme = "nord-aurora"

[editor]
line-number = "relative"
mouse = true
bufferline = "always"
color-modes = true
cursorline = true
auto-format = false
# `focus-lost` saves when Helix loses focus. `after-delay` adds a 1s idle
# auto-save so an unattended buffer doesn't sit dirty for long - the
# auto-reload handler below skips buffers with unsaved edits, so a buffer
# left modified will never get reload-prompted for external changes.
auto-save = { focus-lost = true, after-delay = { enable = true, timeout = 1000 } }

# Auto-reload externally-modified files. Patched in via helix-editor/helix
# PR #13963 with a local tweak that silences the periodic reload (see
# README for build provenance).
# - focus-gained: on terminal refocus, silently reload any open buffer
#   whose mtime advanced.
# - periodic.enable + interval: same check on a timer.
# Unsaved buffers are filtered out before reload, so in-flight edits
# can never be clobbered - they just stay invisible to the check until
# you save (which is why the auto-save block above matters).
[editor.auto-reload]
focus-gained = true
periodic.enable = true
periodic.interval = 3000
completion-trigger-len = 1
true-color = true
# Pin to pbcopy/pbpaste on macOS. Redundant with auto-detect today, but
# defensive: if anything in the launch chain ever sets TMUX again, helix's
# auto-detect would prefer `tmux save-buffer` over pasteboard.
clipboard-provider = "pasteboard"
# Implicitly trust every workspace - skips the "trust this project?" prompt
# on first open. The flag is named `insecure` because it disables the guard
# against malicious local-config / language-server payloads in untrusted
# repos. Safe enough when you only open projects you authored.
insecure = true

[editor.gutters]
# Default layout omits a trailing spacer, so the diff stripe sits flush
# against the buffer content. Add one to give it breathing room.
layout = ["diagnostics", "spacer", "line-numbers", "spacer", "diff", "spacer"]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = ["mode", "spinner", "version-control", "file-name", "file-modification-indicator"]
center = []
right = ["diagnostics", "selections", "register", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.file-picker]
hidden = false

[editor.indent-guides]
render = false

[editor.soft-wrap]
enable = false

[editor.whitespace.render]
space = "none"
tab = "all"
nbsp = "all"
newline = "none"

[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
tab = "→"
newline = "⏎"

[keys.normal]
# Quick save/quit
"space"."w" = ":w"
"space"."q" = ":q"
"space"."x" = ":x"
# Center cursor on screen movements
"C-d" = ["half_page_down", "align_view_center"]
"C-u" = ["half_page_up", "align_view_center"]
# Easier line navigation
"H" = "goto_line_start"
"L" = "goto_line_end"

# EXPERIMENT: toggle the sidebar pane by close/spawn instead of
# toggle-fullscreen on the editor. See scripts/toggle-sidebar.sh for
# the diagnostic rationale. If this kills the 50%->18% flicker, the
# culprit was helix's repaint under fullscreen restoration; if not,
# zellij's pane sizing itself is involved.
"space"."e" = ":sh $HOME/projects/helix-files/scripts/toggle-sidebar.sh"

# Reveal current buffer in the broot sidebar pane. broot is started with
# --listen on a per-session socket (see zellij/layouts/default.kdl); the
# dispatcher sends a `:focus <path>` command over that socket so broot
# scrolls/expands to the current file without stealing focus from helix.
"A-r" = ":sh $HOME/projects/helix-files/scripts/dispatch-to-sidebar.sh '%{buffer_name}'"

[keys.insert]
"j"."k" = "normal_mode"
