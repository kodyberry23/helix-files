# Yazi configuration. See: https://yazi-rs.github.io/docs/configuration/yazi
# Note: the `[manager]` table was renamed to `[mgr]` in recent yazi versions.

[mgr]
# ratio = [parent, current, preview]; relative weights, so [1, 1, 2] →
# 25% / 25% / 50%. Set a column to 0 to hide it.
ratio          = [1, 1, 2]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true

[preview]
tab_size      = 2
max_width     = 600
max_height    = 900
cache_dir     = ""
image_filter  = "triangle"
image_quality = 75

[opener]
# `block = true` suspends yazi while helix runs (zellij pane → yazi → helix
# → yazi → shell). `TMUX=zellij` inside zellij forces helix to skip its
# OSC 11 background-color exchange — see scripts/setup.sh hx() for the full
# rationale. The bash opener doesn't source ~/.zshrc so the wrapper is
# duplicated here for the yazi → hx launch path.
#
# The leading printf sets the OSC 0 terminal title (which zellij surfaces
# as the pane title) to "hx <project>" — the basename of the git toplevel
# (or the file's parent dir when not in a repo). Yazi's teardown clears
# the title to an empty string when it suspends, and helix never sets one
# of its own — without this, the zellij pane frame loses its title for
# the whole helix session and only restores when yazi resumes.
edit = [
  { run = 'd=$(dirname "$1"); p=$(git -C "$d" rev-parse --show-toplevel 2>/dev/null) || p=$d; printf "\033]0;hx %s\007" "${p##*/}"; if [ -n "$ZELLIJ" ]; then TMUX=zellij hx "$@"; else hx "$@"; fi', desc = "Helix", block = true, for = "unix" },
]
open = [
  { run = 'open %s', desc = "Open", for = "macos" },
]
reveal = [
  { run = 'open -R %s', desc = "Reveal in Finder", for = "macos" },
]
extract = [
  { run = 'unar %s', desc = "Extract here", for = "unix" },
]
play = [
  { run = 'mpv %s', orphan = true, for = "unix" },
]

[open]
# Order matters — first matching rule wins for the default `open` action.
# The catch-all uses `edit` (Helix) FIRST so any file libmagic doesn't
# classify into a more specific bucket below still opens in Helix instead
# of falling through to macOS `open` (which routes to whatever app the OS
# thinks owns the extension — TextEdit, VSCode, etc.).
rules = [
  { mime = "image/*", use = ["open", "reveal"] },
  { mime = "video/*", use = ["play", "reveal"] },
  { mime = "audio/*", use = ["play", "reveal"] },
  { mime = "application/zip",            use = ["extract", "reveal"] },
  { mime = "application/gzip",           use = ["extract", "reveal"] },
  { mime = "application/x-tar",          use = ["extract", "reveal"] },
  { mime = "application/x-bzip2",        use = ["extract", "reveal"] },
  { mime = "application/x-7z-compressed", use = ["extract", "reveal"] },
  { mime = "application/x-rar",          use = ["extract", "reveal"] },
  # Directories — entering a dir uses the `enter` action via keymap.toml,
  # not `open`. This rule is the fallback when explicitly invoked.
  { url = "*/", use = ["edit", "open", "reveal"] },
  # Everything else (text, json, code, unknown MIME) → Helix first.
  { mime = "*", use = ["edit", "open", "reveal"] },
]

[tasks]
micro_workers    = 5
macro_workers    = 10
bizarre_retry    = 5
image_alloc      = 536870912
image_bound      = [0, 0]
# Don't preload previews on startup — yazi otherwise spawns preview workers
# and renders the auto-selected file's preview before drawing the UI, which
# is the main cause of the perceived 1-2s "before yazi shows" latency when
# launching from helix's `space e`. Previews still render on demand when
# you hover a file; the first preview after launch is just slightly slower.
suppress_preload = true
