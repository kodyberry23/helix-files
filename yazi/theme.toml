# Deep Nord Aurora flavor for Yazi — backgrounds inkier, accents richer.
# Schema ref: https://yazi-rs.github.io/docs/configuration/theme/

[mgr]
cwd = { fg = "#74BCD9" }                                              # frost1

# Hover row
hovered         = { fg = "#1A1F28", bg = "#74BCD9", bold = true }     # frost1 / polar0
preview_hovered = { underline = true }

# Find / search highlights
find_keyword  = { fg = "#DDB867", italic = true }                     # yellow
find_position = { fg = "#D97757", bg = "reset", italic = true }       # orange

# Marker (visual selection bar)
marker_copied   = { fg = "#8DBC6E", bg = "#8DBC6E" }                  # green
marker_cut      = { fg = "#D04E5C", bg = "#D04E5C" }                  # red
marker_marked   = { fg = "#74BCD9", bg = "#74BCD9" }                  # frost1
marker_selected = { fg = "#DDB867", bg = "#DDB867" }                  # yellow

# Tab line
tab_active   = { fg = "#1A1F28", bg = "#74BCD9", bold = true }
tab_inactive = { fg = "#D8DEE9", bg = "#232934" }
tab_width    = 1

# File counts
count_copied   = { fg = "#ECEFF4", bg = "#8DBC6E" }
count_cut      = { fg = "#ECEFF4", bg = "#D04E5C" }
count_selected = { fg = "#1A1F28", bg = "#DDB867" }

# Border lines between panes
border_symbol = "│"
border_style  = { fg = "#4F5870" }                                    # polar3

# Highlights inside the listing
syntect_theme = ""

[mode]
normal_main = { fg = "#1A1F28", bg = "#74BCD9", bold = true }         # frost1
normal_alt  = { fg = "#74BCD9", bg = "#232934" }
select_main = { fg = "#1A1F28", bg = "#DDB867", bold = true }         # yellow
select_alt  = { fg = "#DDB867", bg = "#232934" }
unset_main  = { fg = "#1A1F28", bg = "#B97AB6", bold = true }         # purple
unset_alt   = { fg = "#B97AB6", bg = "#232934" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#232934", bg = "#232934" }

# Permissions
perm_type  = { fg = "#74BCD9" }
perm_read  = { fg = "#DDB867" }
perm_write = { fg = "#D04E5C" }
perm_exec  = { fg = "#8DBC6E" }
perm_sep   = { fg = "#4F5870" }

progress_label  = { fg = "#ECEFF4", bold = true }
progress_normal = { fg = "#74BCD9", bg = "#232934" }
progress_error  = { fg = "#D04E5C", bg = "#232934" }

[input]
border   = { fg = "#74BCD9" }
title    = {}
value    = {}
selected = { reversed = true }

[select]
border   = { fg = "#74BCD9" }
active   = { fg = "#D97757" }                                         # orange
inactive = {}

[tasks]
border   = { fg = "#74BCD9" }
title    = {}
hovered  = { fg = "#D97757", underline = true }

[which]
mask            = { bg = "#232934" }
cand            = { fg = "#74BCD9" }                                  # frost1
rest            = { fg = "#5F8FBF" }                                  # frost2
desc            = { fg = "#D97757" }                                  # orange
separator       = "  "
separator_style = { fg = "#4F5870" }

[help]
on        = { fg = "#D97757" }
exec      = { fg = "#74BCD9" }
desc      = { fg = "#D8DEE9" }
hovered   = { bg = "#232934", bold = true }
footer    = { fg = "#232934", bg = "#D8DEE9" }

[notify]
title_info  = { fg = "#74BCD9" }
title_warn  = { fg = "#DDB867" }
title_error = { fg = "#D04E5C" }
icon_info   = ""
icon_warn   = ""
icon_error  = ""

# Filename styling — Aurora accents per file kind
[filetype]
rules = [
  # Images
  { mime = "image/*", fg = "#B97AB6" },                               # purple
  # Videos
  { mime = "video/*", fg = "#DDB867" },                               # yellow
  # Audio
  { mime = "audio/*", fg = "#DDB867" },                               # yellow
  # Archives
  { mime = "application/zip",            fg = "#D97757" },            # orange
  { mime = "application/gzip",           fg = "#D97757" },
  { mime = "application/x-tar",          fg = "#D97757" },
  { mime = "application/x-bzip",         fg = "#D97757" },
  { mime = "application/x-bzip2",        fg = "#D97757" },
  { mime = "application/x-7z-compressed",fg = "#D97757" },
  { mime = "application/x-rar",          fg = "#D97757" },
  # Documents / data
  { mime = "application/json", fg = "#8DBC6E" },                      # green
  { mime = "text/*",           fg = "#D8DEE9" },                      # snow0
  # Directories
  { name = "*/", fg = "#74BCD9", bold = true },                       # frost1
  # Fallback
  { name = "*",  fg = "#D8DEE9" },
]
