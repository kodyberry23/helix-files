# Nord Aurora flavor for Yazi.
# Palette ref: https://www.nordtheme.com/docs/colors-and-palettes
# Schema ref:  https://yazi-rs.github.io/docs/configuration/theme/

[mgr]
cwd = { fg = "#88C0D0" }                                              # frost1

# Hover row
hovered         = { fg = "#2E3440", bg = "#88C0D0", bold = true }     # frost1 / polar0
preview_hovered = { underline = true }

# Find / search highlights
find_keyword  = { fg = "#EBCB8B", italic = true }                     # yellow
find_position = { fg = "#D08770", bg = "reset", italic = true }       # orange

# Marker (visual selection bar)
marker_copied   = { fg = "#A3BE8C", bg = "#A3BE8C" }                  # green
marker_cut      = { fg = "#BF616A", bg = "#BF616A" }                  # red
marker_marked   = { fg = "#88C0D0", bg = "#88C0D0" }                  # frost1
marker_selected = { fg = "#EBCB8B", bg = "#EBCB8B" }                  # yellow

# Tab line
tab_active   = { fg = "#2E3440", bg = "#88C0D0", bold = true }
tab_inactive = { fg = "#D8DEE9", bg = "#3B4252" }
tab_width    = 1

# File counts
count_copied   = { fg = "#ECEFF4", bg = "#A3BE8C" }
count_cut      = { fg = "#ECEFF4", bg = "#BF616A" }
count_selected = { fg = "#2E3440", bg = "#EBCB8B" }

# Border lines between panes
border_symbol = "│"
border_style  = { fg = "#4C566A" }                                    # polar3

# Highlights inside the listing
syntect_theme = ""

[mode]
normal_main = { fg = "#2E3440", bg = "#88C0D0", bold = true }         # frost1
normal_alt  = { fg = "#88C0D0", bg = "#3B4252" }
select_main = { fg = "#2E3440", bg = "#EBCB8B", bold = true }         # yellow
select_alt  = { fg = "#EBCB8B", bg = "#3B4252" }
unset_main  = { fg = "#2E3440", bg = "#B48EAD", bold = true }         # purple
unset_alt   = { fg = "#B48EAD", bg = "#3B4252" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#3B4252", bg = "#3B4252" }

# Permissions
perm_type  = { fg = "#88C0D0" }
perm_read  = { fg = "#EBCB8B" }
perm_write = { fg = "#BF616A" }
perm_exec  = { fg = "#A3BE8C" }
perm_sep   = { fg = "#4C566A" }

progress_label  = { fg = "#ECEFF4", bold = true }
progress_normal = { fg = "#88C0D0", bg = "#3B4252" }
progress_error  = { fg = "#BF616A", bg = "#3B4252" }

[input]
border   = { fg = "#88C0D0" }
title    = {}
value    = {}
selected = { reversed = true }

[select]
border   = { fg = "#88C0D0" }
active   = { fg = "#D08770" }                                         # orange
inactive = {}

[tasks]
border   = { fg = "#88C0D0" }
title    = {}
hovered  = { fg = "#D08770", underline = true }

[which]
mask            = { bg = "#3B4252" }
cand            = { fg = "#88C0D0" }                                  # frost1
rest            = { fg = "#81A1C1" }                                  # frost2
desc            = { fg = "#D08770" }                                  # orange
separator       = "  "
separator_style = { fg = "#4C566A" }

[help]
on        = { fg = "#D08770" }
exec      = { fg = "#88C0D0" }
desc      = { fg = "#D8DEE9" }
hovered   = { bg = "#3B4252", bold = true }
footer    = { fg = "#3B4252", bg = "#D8DEE9" }

[notify]
title_info  = { fg = "#88C0D0" }
title_warn  = { fg = "#EBCB8B" }
title_error = { fg = "#BF616A" }
icon_info   = ""
icon_warn   = ""
icon_error  = ""

# Filename styling — Aurora accents per file kind
[filetype]
rules = [
  # Images
  { mime = "image/*", fg = "#B48EAD" },                               # purple
  # Videos
  { mime = "video/*", fg = "#EBCB8B" },                               # yellow
  # Audio
  { mime = "audio/*", fg = "#EBCB8B" },                               # yellow
  # Archives
  { mime = "application/zip",            fg = "#D08770" },            # orange
  { mime = "application/gzip",           fg = "#D08770" },
  { mime = "application/x-tar",          fg = "#D08770" },
  { mime = "application/x-bzip",         fg = "#D08770" },
  { mime = "application/x-bzip2",        fg = "#D08770" },
  { mime = "application/x-7z-compressed",fg = "#D08770" },
  { mime = "application/x-rar",          fg = "#D08770" },
  # Documents / data
  { mime = "application/json", fg = "#A3BE8C" },                      # green
  { mime = "text/*",           fg = "#D8DEE9" },                      # snow0
  # Directories
  { name = "*/", fg = "#88C0D0", bold = true },                       # frost1
  # Fallback
  { name = "*",  fg = "#D8DEE9" },
]
