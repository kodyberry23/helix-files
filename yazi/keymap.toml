# Yazi keymap. See: https://yazi-rs.github.io/docs/configuration/keymap

[mgr]
keymap = [
  # Navigation. `h` is routed through the stay-root plugin so it can't
  # escape the project root when YAZI_LOCK_ROOT is exported (sessionizer
  # + helix `space e` paths). When the env var is unset (plain `yazi`
  # from a shell), the plugin falls through to the built-in `leave`.
  # `H` jumps back to the lock root from anywhere inside it.
  { on = "h", run = "plugin stay-root up",   desc = "Parent dir (blocked at project root)" },
  { on = "H", run = "plugin stay-root root", desc = "Jump to project root" },
  { on = "j", run = "arrow 1",  desc = "Move down" },
  { on = "k", run = "arrow -1", desc = "Move up" },
  { on = "l", run = "enter",  desc = "Enter directory" },
  { on = "g", run = "arrow -99999999", desc = "Move to top" },
  { on = "G", run = "arrow 99999999",  desc = "Move to bottom" },

  # Selection
  { on = "<Space>", run = ["select --state=none", "arrow 1"], desc = "Toggle selection" },
  { on = "v", run = "visual_mode", desc = "Enter visual mode" },
  { on = "V", run = "visual_mode --unset", desc = "Visual unselect mode" },

  # File ops
  { on = "y", run = "yank",          desc = "Copy selected files" },
  { on = "x", run = "yank --cut",    desc = "Cut selected files" },
  { on = "p", run = "paste",         desc = "Paste yanked files" },
  { on = "P", run = "paste --force", desc = "Paste (overwrite)" },
  { on = "d", run = "remove",        desc = "Trash selected files" },
  { on = "D", run = "remove --permanently", desc = "Permanently delete" },
  { on = "a", run = "create",        desc = "Create file/dir" },
  { on = "r", run = "rename",        desc = "Rename" },

  # View
  { on = ".", run = "hidden toggle", desc = "Toggle hidden files" },
  { on = "/", run = "find",          desc = "Find" },
  { on = "n", run = "find_arrow",    desc = "Next match" },
  { on = "N", run = "find_arrow --previous", desc = "Previous match" },

  # Tabs
  { on = "t", run = "tab_create --current", desc = "New tab" },
  { on = "<C-t>", run = "tab_close 0",      desc = "Close tab" },
  { on = "1", run = "tab_switch 0", desc = "Tab 1" },
  { on = "2", run = "tab_switch 1", desc = "Tab 2" },
  { on = "3", run = "tab_switch 2", desc = "Tab 3" },

  # Open
  { on = "<Enter>", run = "open",          desc = "Open" },
  { on = "o",       run = "open --interactive", desc = "Open with..." },
  { on = "<Esc>",   run = "escape",        desc = "Cancel" },
  { on = "q",       run = "quit",          desc = "Quit" },

  # Helix integration: when launched from helix's space-e picker via
  # scripts/yazi-pick.sh, $YAZI_PICK_MARKER is set. The helix-vsplit Lua
  # plugin writes "VSPLIT:<path>" to that file and quits yazi. The wrapper
  # picks up the marker and routes to :vsplit instead of :open. Plugin
  # used (vs `shell ...; quit`) because yazi's shell action is async —
  # quit fires before the spawned printf can write.
  { on = "<C-v>", run = "plugin helix-vsplit", desc = "Pick into helix vsplit" },
]
